<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Global Weather Contourf Viewer</title>
    
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #111;
            color: #fff;
            overflow: hidden;
        }
        #cesiumContainer {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            bottom: 0;
            z-index: 1;
        }
        .control-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(20, 20, 20, 0.9);
            padding: 10px 12px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: calc(100% - 20px);
            max-width: 280px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .control-group {
            margin-bottom: 8px;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }
        label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #aaa;
            margin-bottom: 3px;
        }
        select, input[type="range"], button {
            width: 100%;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 6px 8px;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 12px;
            margin-bottom: 2px;
            cursor: pointer;
        }
        input[type="range"] {
            padding: 4px 0;
            margin-top: 2px;
        }
        button {
            padding: 6px;
            font-weight: 500;
        }
        button.active {
            background: #0082ff;
            border-color: #00ceff;
        }
        .status-box {
            font-family: monospace;
            font-size: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px;
            border-radius: 4px;
            border-left: 2px solid #0082ff;
            white-space: pre-line;
            line-height: 1.3;
            color: #ccc;
        }
        #hourLabel {
            text-transform: none;
            font-weight: bold;
            display: inline;
            margin-left: 5px;
            font-size: 11px;
            color: #fff;
        }
    </style>
</head>
<body>

    <div id="cesiumContainer"></div>

    <div class="control-panel">
        <div class="control-group">
            <label for="basemapSelect">3D Globe Basemap</label>
            <select id="basemapSelect">
                <option value="dark">CARTO Dark Canvas</option>
                <option value="satellite">Esri World Imagery</option>
            </select>
        </div>

        <div class="control-group">
            <label for="modelSelect">3D Weather Model Target</label>
            <select id="modelSelect">
                <option value="GFS">GFS Surface Wind (GPU)</option>
                <option value="GFS 850hPa">GFS 850hPa Wind (GPU)</option>
                <option value="ECMWF 10m">ECMWF 10m Wind (GPU)</option>
            </select>
        </div>

        <div class="control-group">
            <label for="slider">3D Forecast Timeline <span id="hourLabel">+000h</span></label>
            <input type="range" id="slider" min="0" max="40" value="0" step="1">
        </div>

        <div class="control-group">
            <button id="playBtn">Play Animation</button>
            <button id="iconBtn">GFS Smooth Rain</button>
            <button id="liveRadarBtn">RainViewer Live Map</button>
            <button id="satBtn">IR Satellite Layer: Off</button>
        </div>

        <div class="control-group">
            <label>GPU Engine Status</label>
            <div class="status-box" id="statusDisplay">Initializing 3D Globe...</div>
        </div>
    </div>

    <script>
        // =========================================================================
        // 1. INITIALIZE CESIUM 3D GLOBE & BASEMAP ROUTING
        // =========================================================================
        const darkImagery = new Cesium.UrlTemplateImageryProvider({
            url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
            credit: '© CARTO'
        });

        const satImagery = new Cesium.UrlTemplateImageryProvider({
            url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
            credit: 'Tiles © Esri'
        });

        const viewer = new Cesium.Viewer('cesiumContainer', {
            imageryProvider: darkImagery,
            geocoder: false,
            homeButton: false,
            sceneModePicker: true, 
            navigationHelpButton: false,
            animation: false,
            timeline: false,
            fullscreenButton: false,
            baseLayerPicker: false
        });

        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(114.17, 22.3, 10000000.0)
        });

        document.getElementById('basemapSelect').onchange = function() {
            const layers = viewer.imageryLayers;
            layers.remove(layers.get(0)); 
            if (this.value === 'satellite') {
                layers.addImageryProvider(satImagery, 0);
            } else {
                layers.addImageryProvider(darkImagery, 0);
            }
        };

        // =========================================================================
        // 2. LOAD 3D LAND COASTLINE BOUNDARIES
        // =========================================================================
        Cesium.GeoJsonDataSource.load('https://d2ad6b4ur7yvpq.cloudfront.net/naturalearth-3.3.0/ne_110m_coastline.geojson', {
            stroke: Cesium.Color.fromCssColorString('#ffffff').withAlpha(0.4), 
            strokeWidth: 2,                                                   
            fill: Cesium.Color.TRANSPARENT                                    
        }).then(function(dataSource) {
            viewer.dataSources.add(dataSource);
            const entities = dataSource.entities.values;
            for (let i = 0; i < entities.length; i++) {
                const entity = entities[i];
                if (entity.polyline) {
                    entity.polyline.clampToGround = true; 
                    entity.polyline.width = 1.5;
                }
            }
        });

        // =========================================================================
        // 3. APPLICATION STATE BOUNDS
        // =========================================================================
        const hours = [];
        for (let h = 0; h <= 240; h += 6) {
            if (h > 120 && h % 12 !== 0) continue;
            hours.push(h.toString().padStart(3, '0'));
        }

        let playTimer = null;            
        let satLayerActive = false;       
        let satelliteLayerInstance = null;
        let gpuParticleSystemInstance = null; 
        
        let currentRainLayerType = null; 
        // We now use an array to track both split hemispheres simultaneously
        let activeRainLayers = []; 

        const slider = document.getElementById('slider');
        const modelSelect = document.getElementById('modelSelect');
        const hourLabel = document.getElementById('hourLabel'); 
        const statusDisplay = document.getElementById('statusDisplay'); 
        const playBtn = document.getElementById('playBtn');
        const iconBtn = document.getElementById('iconBtn');
        const liveRadarBtn = document.getElementById('liveRadarBtn');
        const satBtn = document.getElementById('satBtn');

        if (slider) slider.max = (hours.length - 1).toString(); 

        function formatForecastTime(refTimeStr, forecastHours) {
            const refDate = new Date(refTimeStr);
            refDate.setHours(refDate.getHours() + parseInt(forecastHours, 10));
            return refDate.toLocaleString(undefined, {
                weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
            });
        }

        // =========================================================================
        // 4. HARDWARE-ACCELERATED HIGH-PERFORMANCE WIND PARTICLE ENGINE
        // =========================================================================
        class CesiumWindParticleEngine {
            constructor(scene, jsonData) {
                this.scene = scene;
                this.header = jsonData[0].header;
                this.uData = jsonData[0].data;
                this.vData = jsonData[1].data;
                this.maxParticles = 35000; 
                this.particles = [];
                this._initParticles();
                this.removeEventListener = scene.preRender.addEventListener(this.updateAndDraw.bind(this));
            }

            _initParticles() {
                for (let i = 0; i < this.maxParticles; i++) {
                    this.particles.push({
                        lon: Math.random() * (this.header.lo2 - this.header.lo1) + this.header.lo1,
                        lat: Math.random() * (this.header.la1 - this.header.la2) + this.header.la2,
                        age: Math.floor(Math.random() * 100)
                    });
                }
                this.pointCollection = this.scene.primitives.add(new Cesium.PointPrimitiveCollection());
                for (let i = 0; i < this.maxParticles; i++) {
                    this.pointCollection.add({ pixelSize: 2.0, color: Cesium.Color.CYAN.withAlpha(0.6) });
                }
            }

            updateAndDraw() {
                const nx = this.header.nx; const ny = this.header.ny;
                const lo1 = this.header.lo1; const la1 = this.header.la1;
                const dx = this.header.dx; const dy = this.header.dy;

                for (let i = 0; i < this.maxParticles; i++) {
                    let p = this.particles[i]; p.age++;
                    if (p.age > 100 || p.lon < lo1 || p.lon > this.header.lo2 || p.lat < this.header.la2 || p.lat > la1) {
                        p.lon = Math.random() * (this.header.lo2 - lo1) + lo1;
                        p.lat = Math.random() * (la1 - this.header.la2) + this.header.la2;
                        p.age = 0;
                    }
                    const col = Math.floor((p.lon - lo1) / dx);
                    const row = Math.floor((la1 - p.lat) / dy);
                    const index = row * nx + col;

                    let u = this.uData[index] || 0; let v = this.vData[index] || 0;
                    p.lon += u * 0.005; p.lat += v * 0.005;

                    const position = Cesium.Cartesian3.fromDegrees(p.lon, p.lat, 6000.0);
                    const pointPrimitive = this.pointCollection.get(i);
                    pointPrimitive.position = position;

                    const speed = Math.sqrt(u*u + v*v);
                    if (speed > 15) { pointPrimitive.color = Cesium.Color.YELLOW.withAlpha(0.7); }
                    else if (speed > 5) { pointPrimitive.color = Cesium.Color.CYAN.withAlpha(0.6); }
                    else { pointPrimitive.color = Cesium.Color.BLUE.withAlpha(0.3); }
                }
            }

            destroy() {
                if (this.removeEventListener) this.removeEventListener();
                this.scene.primitives.remove(this.pointCollection);
            }
        }

        // =========================================================================
        // 5. DATA LOADING & PRECIPITATION PIPELINE MANAGEMENT
        // =========================================================================
        async function update3DGlobe() {
            const index = slider.value;
            const h = hours[index];
            const selectedModel = modelSelect.value;

            let gfsRainPath = `../data/gfs_rain_f${h}.json`;
            await handlePrecipitationPipelines(gfsRainPath);

            let windPath = `../data/gfs_f${h}.json`;
            if (selectedModel === "GFS 850hPa") { windPath = `../data/gfs_850_f${h}.json`; }
            else if (selectedModel === "ECMWF 10m") { windPath = `../data/ecmwf_10m_f${h}.json`; }

            statusDisplay.innerHTML = `Injecting JSON matrices to GPU: ${windPath}...`;

            try {
                const res = await fetch(windPath);
                if (!res.ok) throw new Error("JSON asset tracking array missing.");
                const data = await res.json();

                const referenceTime = data[0].header.refTime;
                const humanReadableTime = formatForecastTime(referenceTime, h);

                hourLabel.innerHTML = `(+${h}h) <span style="color: #00ceff; font-weight: normal; font-size: 11px; margin-left: 4px;">📅 ${humanReadableTime}</span>`;

                if (gpuParticleSystemInstance) {
                    gpuParticleSystemInstance.destroy();
                    gpuParticleSystemInstance = null;
                }

                gpuParticleSystemInstance = new CesiumWindParticleEngine(viewer.scene, data);
                statusDisplay.innerHTML = `MODEL: ${selectedModel}\nRUN: ${referenceTime}\nVALID: ${humanReadableTime}\nENGINE: WebGL 3D Hardware Core`;

            } catch (err) {
                statusDisplay.innerHTML = `⚠️ WEBGL INGESTION ERROR:\n${err.message}`;
            }
        }

        // =========================================================================
        // 6. MULTI-SOURCE 3D PRECIPITATION ROUTER ENGINE
        // =========================================================================
        async function handlePrecipitationPipelines(gfsRainPath) {
            liveRadarBtn.classList.remove('active');
            iconBtn.classList.remove('active');

            // Clear old active layers
            activeRainLayers.forEach(layer => viewer.imageryLayers.remove(layer));
            activeRainLayers = [];

            if (!currentRainLayerType) return;

            if (currentRainLayerType === 'gfs_rain') {
                iconBtn.classList.add('active');
                await renderGfs3DRain(gfsRainPath);
            } 
            else if (currentRainLayerType === 'rv_live') {
                liveRadarBtn.classList.add('active');
                try {
                    const res = await fetch('https://api.rainviewer.com/public/weather-maps.json');
                    const data = await res.json();
                    
                    if (data.radar && data.radar.past && data.radar.past.length > 0) {
                        const targetFrame = data.radar.past[data.radar.past.length - 1];
                        const tileUrl = `${data.host}${targetFrame.path}/1024/{z}/{x}/{y}/2/1_1.png`;
                        
                        let layer = viewer.imageryLayers.addImageryProvider(
                            new Cesium.UrlTemplateImageryProvider({
                                url: tileUrl,
                                alpha: 0.60
                            })
                        );
                        activeRainLayers.push(layer);
                    }
                } catch (err) {
                    console.error("Failed to query RainViewer API assets:", err);
                }
            }
        }

        // =========================================================================
        // 7. GFS FORECAST CONTOURF APCP RENDERER (SPLIT-HEMISPHERE $360^\circ$ ENGINE)
        // =========================================================================
        async function renderGfs3DRain(filePath) {
            try {
                const res = await fetch(filePath);
                if (!res.ok) throw new Error("Rain map asset array unreadable");
                const gribData = await res.json();
                
                const header = gribData[0].header;
                const rainValues = gribData[0].data; 

                const nx = header.nx; const ny = header.ny;
                const la1 = header.la1; const la2 = header.la2;

                // 1. Setup the high-resolution texture canvas structures
                const renderWidth = 1024; // Width per hemisphere 
                const renderHeight = 1024;

                function getGridValue(c, r) {
                    if (c < 0) c = 0; if (c >= nx) c = nx - 1;
                    if (r < 0) r = 0; if (r >= ny) r = ny - 1;
                    return rainValues[r * nx + c] || 0;
                }

                // Internal pipeline builder to handle isolated data clipping frames
                function generateHemisphereCanvas(isWestern) {
                    const canvas = document.createElement('canvas');
                    canvas.width = renderWidth;
                    canvas.height = renderHeight;
                    const ctx = canvas.getContext('2d');
                    const imgData = ctx.createImageData(renderWidth, renderHeight);

                    for (let y = 0; y < renderHeight; y++) {
                        const srcY = (y / (renderHeight - 1)) * (ny - 1);
                        const r0 = Math.floor(srcY);
                        const r1 = Math.min(r0 + 1, ny - 1);
                        const tY = srcY - r0;

                        for (let x = 0; x < renderWidth; x++) {
                            // Map the target canvas back to correct sections of the 0 to 360 array index window
                            let pct = x / (renderWidth - 1);
                            let lonDeg = isWestern ? (180 + pct * 180) : (pct * 180);
                            
                            let srcX = (lonDeg / 360) * (nx - 1);
                            const c0 = Math.floor(srcX);
                            const c1 = Math.min(c0 + 1, nx - 1);
                            const tX = srcX - c0;

                            const p00 = getGridValue(c0, r0);
                            const p10 = getGridValue(c1, r0);
                            const p01 = getGridValue(c0, r1);
                            const p11 = getGridValue(c1, r1);

                            const topBlend = p00 + tX * (p10 - p00);
                            const bottomBlend = p01 + tX * (p11 - p01);
                            const finalValue = topBlend + tY * (bottomBlend - topBlend);

                            const idx = (y * renderWidth + x) * 4;

                            if (finalValue > 0.1) {
                                if (finalValue <= 2) { 
                                    imgData.data[idx + 0] = 0;   imgData.data[idx + 1] = 120; 
                                    imgData.data[idx + 2] = 255; imgData.data[idx + 3] = 110; 
                                } else if (finalValue <= 10) { 
                                    imgData.data[idx + 0] = 0;   imgData.data[idx + 1] = 200; 
                                    imgData.data[idx + 2] = 100; imgData.data[idx + 3] = 150; 
                                } else if (finalValue <= 25) { 
                                    imgData.data[idx + 0] = 255; imgData.data[idx + 1] = 200; 
                                    imgData.data[idx + 2] = 0;   imgData.data[idx + 3] = 180; 
                                } else { 
                                    imgData.data[idx + 0] = 255; imgData.data[idx + 1] = 60; 
                                    imgData.data[idx + 2] = 0;   imgData.data[idx + 3] = 200; 
                                }
                            } else {
                                imgData.data[idx + 3] = 0; 
                            }
                        }
                    }
                    ctx.putImageData(imgData, 0, 0);

                    // Smooth visual interpolation styling
                    ctx.globalCompositeOperation = 'copy';
                    ctx.filter = 'blur(1.5px)';
                    ctx.drawImage(canvas, 0, 0);
                    
                    return canvas.toDataURL();
                }

                // 2. Generate data textures for both hemispheres
                const eastImgData = generateHemisphereCanvas(false); // 0 to 180
                const westImgData = generateHemisphereCanvas(true);  // 180 to 360 (remapped as -180 to 0)

                // 3. Define clean boundaries that match Cesium's standards
                const eastRect = Cesium.Rectangle.fromDegrees(0, Math.min(la1, la2), 180, Math.max(la1, la2));
                const westRect = Cesium.Rectangle.fromDegrees(-180, Math.min(la1, la2), 0, Math.max(la1, la2));

                // 4. Mount both layers simultaneously onto the globe map layer chain
                let eastLayer = viewer.imageryLayers.addImageryProvider(
                    new Cesium.SingleTileImageryProvider({ url: eastImgData, rectangle: eastRect })
                );
                eastLayer.alpha = 0.65;
                activeRainLayers.push(eastLayer);

                let westLayer = viewer.imageryLayers.addImageryProvider(
                    new Cesium.SingleTileImageryProvider({ url: westImgData, rectangle: westRect })
                );
                westLayer.alpha = 0.65;
                activeRainLayers.push(westLayer);

            } catch (err) {
                console.error("GFS 3D Split-Contourf Pipeline aborted:", err);
            }
        }

        // =========================================================================
        // 8. INTERACTION HANDLERS & TIMELINE EVENTS
        // =========================================================================
        slider.oninput = () => update3DGlobe();
        modelSelect.onchange = () => update3DGlobe();

        iconBtn.onclick = function() {
            currentRainLayerType = (currentRainLayerType === 'gfs_rain') ? null : 'gfs_rain';
            update3DGlobe();
        };

        liveRadarBtn.onclick = function() {
            currentRainLayerType = (currentRainLayerType === 'rv_live') ? null : 'rv_live';
            update3DGlobe();
        };

        playBtn.onclick = function() {
            if (playTimer) {
                clearInterval(playTimer); playTimer = null;
                this.innerText = "Play Animation"; this.classList.remove('active');
            } else {
                this.innerText = "Pause Animation"; this.classList.add('active');
                playTimer = setInterval(() => {
                    let nextIndex = (parseInt(slider.value) + 1) % hours.length;
                    slider.value = nextIndex;
                    update3DGlobe();
                }, 1800); 
            }
        };

        const targetTime = new Date();
        targetTime.setMinutes(targetTime.getMinutes() - 60);
        const mins = targetTime.getMinutes();
        targetTime.setMinutes(mins - (mins % 10));
        const exactTimeStr = targetTime.toISOString().replace('.000Z', 'Z');

        satBtn.onclick = function() {
            if (satLayerActive) {
                if (satelliteLayerInstance) { viewer.imageryLayers.remove(satelliteLayerInstance); satelliteLayerInstance = null; }
                satBtn.classList.remove('active'); satBtn.innerText = "IR Satellite Layer: Off"; satLayerActive = false;
            } else {
                satelliteLayerInstance = viewer.imageryLayers.addImageryProvider(
                    new Cesium.UrlTemplateImageryProvider({
                        url: 'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/Himawari_AHI_Band13_Clean_Infrared/default/' + exactTimeStr + '/GoogleMapsCompatible_Level6/{z}/{y}/{x}.png',
                        credit: 'NASA GIBS / JMA', maximumLevel: 6
                    })
                );
                satelliteLayerInstance.alpha = 0.55;
                satBtn.classList.add('active'); satBtn.innerText = "IR Satellite Layer: On"; satLayerActive = true;
            }
        };

        update3DGlobe();
    </script>
</body>
</html>
