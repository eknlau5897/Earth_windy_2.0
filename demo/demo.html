<!-- https://github.com/onaci/leaflet-velocity -->

<!DOCTYPE html>
<html>
  <head>
    <title>LeafletVelocity Demo</title>
    <meta charset="utf-8" />
  </head>
  <body>
    <div id="map"></div>
    <div id="ui-panel" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(255, 255, 255, 0.9); padding: 15px 25px; border-radius: 50px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-family: Arial, sans-serif;">
    <button id="playBtn" style="padding: 5px 15px; border-radius: 20px; border: none; background: #3498db; color: white; cursor: pointer; font-weight: bold;">Play</button>
    <select id="modelSelect">
    <option value="GFS">GFS (Global Forecast System)</option>
    <option value="ECMWF">ECMWF (European Model)</option>
    </select>
    <input type="range" id="slider" min="0" value="0" style="width: 200px; cursor: pointer;">
    <span id="label" style="color: #333; font-weight: bold; min-width: 120px;">Forecast: +00h</span>
</div>
    <!--vendor-->
    <script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>
    <link
      rel="stylesheet"
      href="https://npmcdn.com/leaflet@1.1.0/dist/leaflet.css"
    />
    <script src="https://npmcdn.com/leaflet@1.1.0/dist/leaflet.js"></script>

    <!--leaflet-velocity-->
    <link rel="stylesheet" href="../dist/leaflet-velocity.css" />
    <script src="../dist/leaflet-velocity.js"></script>

    <!--demo-->
    <link rel="stylesheet" href="demo.css" />
    <script src="demo.js"></script>
  </body>
</html>
